{% extends 'base.html' %}
{% block content %}
<h2>ყველა კომპონენტი</h2>
<div class="grid">
    {% for product in products %}
        <div class="card">
            <img src="{{ product.image_url }}" alt="{{ product.name }}">
            <h3>{{ product.name }}</h3>
            <p style="color: #00b386; font-weight: bold;">{{ product.price }} ₾</p>
            <a href="{{ url_for('product_detail', product_id=product.id) }}" class="btn">დეტალურად</a>
        </div>
    {% endfor %}
</div>
{% endblock %}
