{% extends 'base.html' %}
{% block content %}
<h2>{{ title }}</h2>
<form method="POST">
    {{ form.hidden_tag() }}
    <div class="form-group">
        {{ form.username.label }}<br>
        {{ form.username(class="form-control") }}
    </div>
    <div class="form-group">
        {{ form.password.label }}<br>
        {{ form.password(class="form-control") }}
    </div>
    {{ form.submit(class="btn") }}
</form>
{% endblock %}
